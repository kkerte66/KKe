<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ujin ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffb199,#ffd1dc);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
padding:20px;
z-index:10;
}

h1{
color:white;
font-size:2.2rem;
text-shadow:0 0 15px rgba(0,0,0,.3);
margin-bottom:25px;
}

button{
padding:15px 30px;
font-size:1.2rem;
border:none;
border-radius:50px;
cursor:pointer;
margin:10px;
transition:.3s;
font-weight:bold;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d6d;
color:white;
}

.heart{
position:absolute;
bottom:-50px;
animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">
<h1>
Ujin ❤️<br>
Will you go on a date with me?
</h1>

<button id="yes">Yes 🥰</button>
<button id="no">No 😭</button>
</div>

<script>
const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");

let scale=1;

function moveNo(){
const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-80);

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

scale+=0.15;
yesBtn.style.transform=`scale(${scale})`;
}

noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

yesBtn.onclick=()=>{
document.body.innerHTML=`
<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
">
<h1 style="font-size:4rem;">YAYYYY ❤️🥰</h1>

<p style="font-size:1.8rem;margin-top:15px;">
Ujin, you just made my day ✨
</p>

<p style="font-size:1.3rem;margin-top:10px;">
Can't wait for our date ❤️
</p>
</div>
`;
};

for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);
}
</script>

</body>
</html>
